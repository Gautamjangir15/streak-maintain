<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="image/png" rel="icon" href="favicon.ico">
    <title>💀💀💀☠️☠️☠️☠️💀💀💀</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0; /* Changed from 20px to 0 for a cleaner edge-to-edge look */
        padding: 20px;
        background-color: #121212; 
        color: #ffffff; 
        
        /* Standard way to link a background image */
        background-image: url('s1.jpeg');
        
        /* Ensures the background covers the full viewport height */
        min-height: 100vh;
        
        /* Correct sizing properties */
        background-size: cover;          
        background-position: center;    
        background-repeat: no-repeat;   
        background-attachment: fixed;   
    }
    
    .streak-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 5px;  
        max-width: 900px; 
        margin: auto;
    }

    .day-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
    }

    .strips {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .strip {
        width: 28px;  
        height: 28px; 
        background-color: rgba(128, 128, 128, 0.5); /* Semi-transparent gray to see wallpaper behind */
        cursor: pointer;
        transition: background 0.3s;
        border-radius: 3px; 
        border: 1px solid rgba(255,255,255,0.1); /* Subtle border */
    }

    .active {
        background-color: rgb(235, 27, 8);
    }

    .day-number {
        font-size: 14px;
        font-weight: bold;
        text-shadow: 1px 1px 2px black; /* Makes numbers readable over any image */
    }
</style>
</head>
<body>

    <h2 style="font-weight: 900; font-size: 2.5rem; color: #f39406; text-shadow: 2px 2px #000;">
 GIVE CONTROL TO hnr
</h2>

    
    <div class="streak-container" id="streak-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const streakContainer = document.getElementById("streak-container");
            const totalDays = 60;

            for (let day = 1; day <= totalDays; day++) {
                const dayDiv = document.createElement("div");
                dayDiv.classList.add("day-container");

                const stripsDiv = document.createElement("div");
                stripsDiv.classList.add("strips");

                for (let stripNum = 1; stripNum <= 4; stripNum++) {
                    const strip = document.createElement("div");
                    strip.classList.add("strip");
                    strip.dataset.day = day;
                    strip.dataset.strip = stripNum;
                    const key = `day-${day}-strip-${stripNum}`;

                    if (localStorage.getItem(key) === "true") {
                        strip.classList.add("active");
                    }

                    strip.addEventListener("click", function () {
                        strip.classList.toggle("active");
                        localStorage.setItem(key, strip.classList.contains("active"));
                    });

                    stripsDiv.appendChild(strip);
                }

                const dayLabel = document.createElement("div");
                dayLabel.classList.add("day-number");
                dayLabel.innerText = day;

                dayDiv.appendChild(stripsDiv);
                dayDiv.appendChild(dayLabel);
                streakContainer.appendChild(dayDiv);
            }
        });
    </script>

</body>
</html>
